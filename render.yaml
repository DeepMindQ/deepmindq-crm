# Render Blueprint — explicit deployment configuration
# https://docs.render.com/blueprint-spec
#
# AUTO-DETECTED ONLY ON NEW SERVICE CREATION.
# If you already have a Render web service, you must either:
#   1. Delete and recreate it (it will auto-detect this file), OR
#   2. Manually set Build Command and Start Command in Render dashboard
#      to match the values below.

services:
  - type: web
    name: deepmindq-crm
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        fromService:
          name: deepmindq-crm
          type: web
          property: hostport
